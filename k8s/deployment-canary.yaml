apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-demo-canary
  namespace: canary-demo
  labels:
    app: canary-demo
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-demo
      track: canary
  template:
    metadata:
      labels:
        app: canary-demo
        track: canary
    spec:
      containers:
        - name: web
          image: canary-demo:v2
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "2.0.0"
            - name: APP_TYPE
              value: "canary"
            - name: FAIL_AFTER
              value: "5"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
